<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Urban Traffic Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div id="flash-container" class="position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>

<div class="auth-page">
    <div style="position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;"></div>

    <div class="auth-card position-relative">
        <div class="auth-logo">
            <i class="fas fa-user-plus"></i>
        </div>
        <div class="auth-title">Create Account</div>
        <div class="auth-sub">Join the Urban Traffic Intelligence System</div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="name"
                           placeholder="Enter your full name" required style="border-radius:0 9px 9px 0;">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" class="form-control border-start-0 ps-0" id="email"
                           placeholder="Enter your email" required style="border-radius:0 9px 9px 0;">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" id="password"
                           placeholder="Min. 6 characters" required minlength="6" style="border-radius:0 9px 9px 0;">
                    <button type="button" class="btn btn-light border" onclick="togglePassword('password',this)">
                        <i class="fas fa-eye text-muted"></i>
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Role</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-id-badge text-muted"></i></span>
                    <select class="form-select border-start-0" id="role" style="border-radius:0 9px 9px 0;">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <small class="text-muted">Admin accounts have access to all data and management features.</small>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-600" id="registerBtn">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted mb-0">Already have an account?
                <a href="/login" class="text-primary fw-600">Sign in here</a>
            </p>
        </div>
        <div class="text-center mt-3">
            <a href="/" class="text-muted small"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
function togglePassword(id, btn) {
    const inp = document.getElementById(id);
    const icon = btn.querySelector('i');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    icon.className = inp.type === 'password' ? 'fas fa-eye text-muted' : 'fas fa-eye-slash text-muted';
}

document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';
    btn.disabled = true;

    try {
        const data = await apiPost('/api/register', {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value
        });
        if (data.success) {
            showToast('Account created! Redirecting to login...', 'success');
            setTimeout(() => window.location.href = '/login', 1200);
        } else {
            showToast(data.message || 'Registration failed.', 'error');
            btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
            btn.disabled = false;
        }
    } catch (err) {
        showToast('Connection error. Please try again.', 'error');
        btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
        btn.disabled = false;
    }
});
</script>
</body>
</html>
